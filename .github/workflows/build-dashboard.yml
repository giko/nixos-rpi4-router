name: build-dashboard

on:
  push:
    branches: [main]
    paths:
      - 'modules/dashboard/frontend/**'
      - 'modules/dashboard/backend/**'
      - '.github/workflows/build-dashboard.yml'
  workflow_dispatch:

concurrency:
  group: build-dashboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: modules/dashboard/frontend/package-lock.json

      - name: Build frontend
        working-directory: modules/dashboard/frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend dist into backend embed directory
        run: |
          rm -rf modules/dashboard/backend/internal/spa/dist
          mkdir -p modules/dashboard/backend/internal/spa/dist
          cp -r modules/dashboard/frontend/dist/* modules/dashboard/backend/internal/spa/dist/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: modules/dashboard/backend/go.mod
          cache-dependency-path: modules/dashboard/backend/go.sum

      - name: Compute version
        id: meta
        run: |
          VERSION="$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=dashboard-$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cross-build dashboard binary for aarch64-linux
        working-directory: modules/dashboard/backend
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: '0'
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          # Embed the release version via -X linker flag so /api/health
          # reports the actual release identifier. Without this, Go's
          # BuildInfo-based fallback would see the CI-rewritten dist/
          # subtree as a dirty worktree and stamp every build as
          # "<sha>-dirty".
          go build \
            -ldflags="-s -w -X github.com/giko/nixos-rpi4-router/modules/dashboard/backend/internal/server.Version=$VERSION" \
            -o dashboard ./cmd/dashboard

      - name: Compute asset hash
        id: hash
        working-directory: modules/dashboard/backend
        run: |
          HASH="sha256-$(openssl dgst -sha256 -binary dashboard | base64)"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Publish-eligibility check (before releasing anything)
        run: |
          set -eu
          # Only main-branch runs may publish. workflow_dispatch from a
          # feature branch would otherwise orphan a release tied to a
          # non-main commit.
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::build-dashboard refuses to publish from ref $GITHUB_REF (only refs/heads/main)" >&2
            exit 1
          fi
          git fetch origin main
          LATEST=$(git rev-parse origin/main)
          if [ "$LATEST" = "$GITHUB_SHA" ]; then
            echo "origin/main is still at $GITHUB_SHA — publishing is safe"
            exit 0
          fi
          # main has moved since we started. If ANY of the intervening
          # commits touched dashboard source paths, our binary is stale
          # and the queued next build (concurrency serializes) will
          # produce a newer one. Skip publishing to avoid orphaning a
          # release that would get immediately superseded.
          CHANGED=$(git diff --name-only "$GITHUB_SHA..$LATEST" -- \
            modules/dashboard/frontend \
            modules/dashboard/backend || true)
          if [ -n "$CHANGED" ]; then
            echo "origin/main has moved past our build commit ($GITHUB_SHA → $LATEST)"
            echo "intervening dashboard-source changes:"
            echo "$CHANGED"
            echo "skipping publish — the queued next build will produce a fresher release"
            # Mark downstream steps as skipped via a job-level output.
            echo "SKIP_PUBLISH=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "origin/main moved but no dashboard-source changes in the interval — safe to publish"

      - name: Upload release asset
        if: env.SKIP_PUBLISH != 'true'
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Dashboard ${{ steps.meta.outputs.version }}
          files: modules/dashboard/backend/dashboard
          fail_on_unmatched_files: true

      - name: Resolve release asset URL
        if: env.SKIP_PUBLISH != 'true'
        id: asset
        run: |
          URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/dashboard"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # No post-upload verify step.
      #
      # Why: verifying the asset by re-downloading and re-hashing is
      # redundant with Nix's own verification. Every consumer running
      # `nixos-rebuild switch` fetches the URL in version.json via
      # `fetchurl { url; hash; }` which hash-checks the downloaded blob
      # on its way into the store. A mismatch is a hard Nix error at
      # deploy time, not a silent bad deploy.
      #
      # The earlier verify step also suffered from a CDN propagation
      # race: softprops/action-gh-release@v2 uploads via GitHub's REST
      # API (transactional — success means the asset IS in object
      # storage), but the public `/releases/download/` endpoint lags by
      # a few seconds on fresh releases, so a curl immediately after
      # upload could 404. Removing the CI-side check also removes the
      # race.
      #
      # Residual risk: a corrupted or tampered asset lands on main's
      # version.json, and every Pi deploy fails with a Nix hash mismatch
      # until a new release is cut. Annoying but visible — never a
      # silent wrong-binary deploy.

      - name: Commit version.json bump
        if: env.SKIP_PUBLISH != 'true'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          URL: ${{ steps.asset.outputs.url }}
          HASH: ${{ steps.hash.outputs.hash }}
        run: |
          set -eu
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          for attempt in 1 2 3; do
            git fetch origin main
            LATEST=$(git rev-parse origin/main)

            # Inner race guard: the outer publish-eligibility check runs
            # before the build, so there's a window (build + upload +
            # verify) during which a dashboard-source commit could land
            # on main. Without this recheck, `git reset --hard` would
            # pick up that newer source and we'd write our older-binary
            # version.json on top of it — creating a revision that's
            # briefly inconsistent (newer source, older pinned binary).
            # The queued next build will fix it, but pinning the
            # inconsistent revision breaks deployments in the meantime.
            if [ "$LATEST" != "$GITHUB_SHA" ]; then
              CHANGED=$(git diff --name-only "$GITHUB_SHA..$LATEST" -- \
                modules/dashboard/frontend \
                modules/dashboard/backend || true)
              if [ -n "$CHANGED" ]; then
                echo "origin/main advanced with dashboard-source changes during build:"
                echo "$CHANGED"
                echo "skipping version.json bump — the queued next build will handle it"
                exit 0
              fi
            fi

            git reset --hard origin/main
            cat > modules/dashboard/version.json <<EOF
          {
            "version": "$VERSION",
            "url": "$URL",
            "hash": "$HASH"
          }
          EOF

            # Rerun idempotency: if this is a workflow_dispatch rerun
            # for the same SHA (same day → same VERSION → same URL and
            # HASH), version.json is already correct and `git commit`
            # would fail with "nothing to commit". Treat that as a
            # success — the release asset is already pinned where it
            # should be.
            if git diff --quiet -- modules/dashboard/version.json; then
              echo "version.json already matches this release — idempotent success"
              exit 0
            fi

            git add modules/dashboard/version.json
            git commit -m "dashboard: release $VERSION"
            if git push origin main; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying..."
            sleep 2
          done
          echo "::error::version.json push failed after 3 attempts" >&2
          exit 1
